spring:
  application:
    name: turkcell-gateway-service
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            maxAge: 3600

      routes:
        - id: subscription-route
          uri: http://localhost:8017
          predicates:
            - Path=/api/v1/subscriptions/**,, /api/v1/subscriptions
      discovery:
        locator:
          enabled: true

server:
  port: 8016